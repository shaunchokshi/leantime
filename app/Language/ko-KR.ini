text.full_lean_canvas_helper_content = "리서치 보드 전체는 아이디어 검증의 전 과정을 안내해요.<br/>이 페이지에서 고객 세그먼트, 문제, 솔루션을 다시 다루게 돼요 (간편 보드에서 이미 작성했다면, 여기서 다시 확인할 수 있어요!).<br/>이후 고유 가치 제안 (우리 아이디어가 다른 것보다 나은 이유는?),<br/>유통 채널 (고객이 솔루션을 어떻게 접하나요?),<br/>수익 구조 (솔루션으로 어떻게 수익을 내나요?),<br/>비용 구조(솔루션을 제공하는 데 어떤 비용이 드나요?), 핵심 지표 (성공을 어떻게 측정하나요?),<br/>그리고 압도적 경쟁 우위 (경쟁에서 눈에 띄게 하는 것은?)를 다뤄요.<br/>이 질문들은 성공을 촉진하고, 실패를 줄이며, 가정을 추적하고 검증하도록 설계되었어요.<br/>린(Lean)이란 낭비를 없애고 고객에게 필요한 제품, 비즈니스, 솔루션을 만드는 것이에요."
